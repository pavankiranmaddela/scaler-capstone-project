spring:
  application:
    name: vehicle-catalog-service
  datasource:
    url: jdbc:h2:mem:vehicle_catalog;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: false
    locations: classpath:db/migration
  # In-memory cache replaces Redis for local dev
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT Configuration
jwt:
  secret-key: 8c326a98bdeef63921e69388cda2b0169a5aebea61801ef7fdef0c558334fdaa2081a99b5319598360591994e66796b8f2fbc602477d1d9c66a6f36fd7ab31863654e03bcd7bc60dc15e6aed4b66ab7cc50749b6f068ffaf288e5407efac1eb49ee886e9d86bac7b9e66f010200d641d1c032d5221fac57c26f4bc2046dd3dd5
  expiration-ms: 3600000

# Add custom properties for unauthenticated endpoints
security:
  unauthenticated-endpoints:
    - "/users/authenticate"
    - "/customers/register"

kind: Application
