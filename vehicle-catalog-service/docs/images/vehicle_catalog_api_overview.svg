<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #2C2C2A; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #444441; }
    .c-gray .ts { fill: #5F5E5A; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  </style>
</defs>

<!-- Actors -->
<g class="c-purple">
  <rect x="20" y="20" width="148" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="94" y="38" text-anchor="middle" dominant-baseline="central">App Admin</text>
  <text class="ts" x="94" y="54" text-anchor="middle" dominant-baseline="central">Full CRUD</text>
</g>
<g class="c-teal">
  <rect x="184" y="20" width="148" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="258" y="38" text-anchor="middle" dominant-baseline="central">Station Owner</text>
  <text class="ts" x="258" y="54" text-anchor="middle" dominant-baseline="central">Read only</text>
</g>
<g class="c-amber">
  <rect x="348" y="20" width="148" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="422" y="38" text-anchor="middle" dominant-baseline="central">Employee</text>
  <text class="ts" x="422" y="54" text-anchor="middle" dominant-baseline="central">Read only</text>
</g>
<g class="c-coral">
  <rect x="512" y="20" width="148" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="586" y="38" text-anchor="middle" dominant-baseline="central">Customer</text>
  <text class="ts" x="586" y="54" text-anchor="middle" dominant-baseline="central">Read + own garage</text>
</g>

<!-- Arrow down to service bar -->
<line x1="340" y1="64" x2="340" y2="90" class="arr" marker-end="url(#arrow)"/>

<!-- Service bar -->
<g class="c-gray">
  <rect x="140" y="90" width="400" height="34" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="111" text-anchor="middle" dominant-baseline="central">Vehicle &amp; Catalog Service</text>
</g>

<!-- Arrow down to groups -->
<line x1="340" y1="124" x2="340" y2="148" class="arr" marker-end="url(#arrow)"/>

<!-- Row 1: API Groups -->
<g class="c-purple">
  <rect x="20" y="148" width="196" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="118" y="167" text-anchor="middle" dominant-baseline="central">Vehicle Makes</text>
  <text class="ts" x="118" y="185" text-anchor="middle" dominant-baseline="central">Manufacturers, regions</text>
</g>
<g class="c-purple">
  <rect x="236" y="148" width="196" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="334" y="167" text-anchor="middle" dominant-baseline="central">Vehicle Models</text>
  <text class="ts" x="334" y="185" text-anchor="middle" dominant-baseline="central">Specs, images, search</text>
</g>
<g class="c-purple">
  <rect x="452" y="148" width="208" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="556" y="167" text-anchor="middle" dominant-baseline="central">Charging Specs</text>
  <text class="ts" x="556" y="185" text-anchor="middle" dominant-baseline="central">Connectors, wattage</text>
</g>

<!-- Row 2: API Groups -->
<g class="c-teal">
  <rect x="20" y="224" width="196" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="118" y="243" text-anchor="middle" dominant-baseline="central">Charging Standards</text>
  <text class="ts" x="118" y="261" text-anchor="middle" dominant-baseline="central">Reference data, types</text>
</g>
<g class="c-teal">
  <rect x="236" y="224" width="196" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="334" y="243" text-anchor="middle" dominant-baseline="central">Compatibility</text>
  <text class="ts" x="334" y="261" text-anchor="middle" dominant-baseline="central">Vehicle-station matching</text>
</g>
<g class="c-coral">
  <rect x="452" y="224" width="208" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="556" y="243" text-anchor="middle" dominant-baseline="central">Customer Garage</text>
  <text class="ts" x="556" y="261" text-anchor="middle" dominant-baseline="central">Saved user vehicles</text>
</g>

<!-- Models label -->
<text class="ts" x="340" y="308" text-anchor="middle" style="fill:#888780;">Core data models</text>
<line x1="80" y1="311" x2="270" y2="311" stroke="#D3D1C7" stroke-width="0.5"/>
<line x1="410" y1="311" x2="600" y2="311" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Model pills row 1 -->
<g class="c-gray"><rect x="20" y="320" width="128" height="34" rx="8" stroke-width="0.5"/>
  <text class="ts" x="84" y="341" text-anchor="middle" dominant-baseline="central">VehicleMake</text></g>
<g class="c-gray"><rect x="160" y="320" width="136" height="34" rx="8" stroke-width="0.5"/>
  <text class="ts" x="228" y="341" text-anchor="middle" dominant-baseline="central">VehicleModel</text></g>
<g class="c-gray"><rect x="308" y="320" width="184" height="34" rx="8" stroke-width="0.5"/>
  <text class="ts" x="400" y="341" text-anchor="middle" dominant-baseline="central">VehicleChargingSpec</text></g>
<g class="c-gray"><rect x="504" y="320" width="156" height="34" rx="8" stroke-width="0.5"/>
  <text class="ts" x="582" y="341" text-anchor="middle" dominant-baseline="central">ChargingStandard</text></g>

<!-- Model pills row 2 -->
<g class="c-gray"><rect x="20" y="366" width="148" height="34" rx="8" stroke-width="0.5"/>
  <text class="ts" x="94" y="387" text-anchor="middle" dominant-baseline="central">CustomerVehicle</text></g>
<g class="c-gray"><rect x="180" y="366" width="188" height="34" rx="8" stroke-width="0.5"/>
  <text class="ts" x="274" y="387" text-anchor="middle" dominant-baseline="central">CompatibilityResult</text></g>
<g class="c-gray"><rect x="380" y="366" width="120" height="34" rx="8" stroke-width="0.5"/>
  <text class="ts" x="440" y="387" text-anchor="middle" dominant-baseline="central">ModelImage</text></g>
<g class="c-gray"><rect x="512" y="366" width="148" height="34" rx="8" stroke-width="0.5"/>
  <text class="ts" x="586" y="387" text-anchor="middle" dominant-baseline="central">MakeRegion</text></g>

<!-- Legend -->
<rect x="20" y="422" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="38" y="432">Admin write APIs</text>
<rect x="180" y="422" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="198" y="432">Reference / read APIs</text>
<rect x="360" y="422" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="378" y="432">Customer-scoped APIs</text>
</svg>
